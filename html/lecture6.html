<!DOCTYPE html>
<html lang="en">
<head>
      <title>video</title>
</head>
<body>
     <h1>waterfall video</h1>
     <video controls width="50%" loop poster="waterfall.mp4" autoplay muted>
            <source src="/video/waterfall.mp4" >
     </video>

     <h1>audio tag</h1>
     <audio controls width="50%"  autoplay muted>
            <source src="/video/song.mpeg">
     </audio>

     <h1>iframe tag</h1>
     <iframe  height="400px" width="700px" name="nature"> </iframe>

     <a href="/video/nature.mp4" target="nature">video</a>
     <a href="/image/marghertia.jpeg" target="nature">image</a>
</body>
</html>
