<html>
	<head>
		<title>form</title>
	</head>
	<body>
		<form method="post" autocomplete="">
			<label>name:</label>
			<input type="name" placeholder="enter your name"/>
			<br/><br/>
			
			<label>password:</label>
			<input type="password" placeholder="enter your password"/>
			<br/><br/>
			
			<label>email:</label>
			<input type="email" placeholder="enter your email"/>
			<br/><br/>
			
			<label>number:</label>
			<input type="number" min="0" max="10" />
			<br/><br/>
			
			<label>tel:</label>
			<input type="tel" placeholder="enter your telphone number"/>
			<br/><br/>
			
			<label>url:</label>
			<input type="url" placeholder="enter your url"/>
			<br/><br/>
			
			<label>date:</label>
			<input type="date"/>
			<br/><br/>
			
			<label>datetime-local:</label>
			<input type="datetime-local"/>
			<br/><br/>
			
			<label>month:</label>
			<input type="month"/>
			<br/><br/>
			
			<label>week:</label>
			<input type="week"/>
			<br/><br/>
			
			<label>time:</label>
			<input type="time"/>
			<br/><br/>
			
			<label>gender:</label>
			<input type="radio" name="gender" checked/>male
			<input type="radio" name="gender"/>female
			<br/><br/>
			
			<label>hobbies:</label>
			<input type="checkbox">cooking
			<input type="checkbox">travelling
			<br/><br/>
			
			<label>range:</label>
			<input type="range" min="0" max="100" />
			<br/><br/>
			
			<label>color:</label>
			<input type="color"/>
			<br/><br/>
			
			<label>file:</label>
			<input type="file"/>
			<br/><br/>
			
			<label>hidden:</label>
			<input type="hidden" value="1234"/>
			<br/><br/>
			
			<input type="submit" value="submit"/>
			<input type="reset" value="reset"/>
			<br/><br/>
			
			<label>search:</label>
			<input type="search" placeholder="search"/>
			
			
			
		</form>
	</body>
	
</html>
