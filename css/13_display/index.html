<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        span{
            border:1px solid black;
            width: 300px;
            height:300px;
            display:inline-block;
            padding: 10px 10px;
        }
        .box{
            width: 500px;
            height: 500px;
            background-color: pink;
            position: relative;
        }
        .box-1{
            width:100px;
            height: 100px;
            background-color:orange;
            top: 0px;
           position: absolute;
           
        }
        .box-2{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            bottom: 0px;
        }
        .box-3{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            right: 0px;
        }
        .box-4{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            right: 0px;
            bottom: 0px;
        }
        .box-5{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            top:100px;
            right: 100px;
        }
         .box-6{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            top:100px;
            left: 100px;
        }
        .box-7{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            top:200px;
        }
        .box-8{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
           right: 200px;
        }
        .box-9{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
            left: 200px;
            bottom: 0px;
        }
        .box-10{
            width:100px;
            height: 100px;
            background-color:orange;
            position: absolute;
           
        }
        ul li{
            display: inline-block;
           
            
        }

        ul li a{
            display: inline-block;
            margin: 10px 20px;
            padding: 10px 10px;
            text-decoration: none;
            border: 1px solid black;
        }
        
       
    </style>
</head>
<body>
    <span>hii</span>
    <span>hello</span>

    <div class="box">
        <div class="box-1"></div>
        <div class="box-2"></div>
        <div class="box-3"></div>
        <div class="box-4"></div>
        <div class="box-5"></div>
         <div class="box-6"></div>
         <div class="box-7"></div>
          <div class="box-8"></div>
          <div class="box-9"></div>
          <div class="box-10"></div>
        
    </div>

    <ul>
        <li>
            <a href="#">home</a>
            <a href="#">about</a>
            <a href="#">contact</a>
        </li>
    </ul>
</body>
</html>
